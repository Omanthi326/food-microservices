apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: food-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: food-microservices-api-gateway
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: AUTH_SERVICE
              value: "http://auth-service:3001"
            - name: FOOD_SERVICE
              value: "http://food-service:3002"
            - name: ORDER_SERVICE
              value: "http://order-service:3003"
            - name: PAYMENT_SERVICE
              value: "http://payment-service:3004"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: food-app
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000
  type: LoadBalancer