apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-service
  namespace: food-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: food-service
  template:
    metadata:
      labels:
        app: food-service
    spec:
      containers:
        - name: food-service
          image: food-microservices-food-service
          imagePullPolicy: Never
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: food-mongo-uri
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt-secret
            - name: CLOUDINARY_CLOUD_NAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: cloudinary-name
            - name: CLOUDINARY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: cloudinary-key
            - name: CLOUDINARY_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: cloudinary-secret
---
apiVersion: v1
kind: Service
metadata:
  name: food-service
  namespace: food-app
spec:
  selector:
    app: food-service
  ports:
    - port: 3002
      targetPort: 3002
  type: ClusterIP