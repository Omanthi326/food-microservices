apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: food-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: food-microservices-order-service
          ports:
            - containerPort: 3003
          env:
            - name: PORT
              value: "3003"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: order-mongo-uri
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt-secret
            - name: RABBITMQ_URL
              value: "amqp://admin:admin123@rabbitmq:5672"
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: food-app
spec:
  selector:
    app: order-service
  ports:
    - port: 3003
      targetPort: 3003
  type: ClusterIP